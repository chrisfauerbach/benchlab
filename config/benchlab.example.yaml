# BenchLab Configuration
# Copy this file to config/benchlab.yaml and customize as needed.

ollama:
  base_url: "http://localhost:11434"
  timeout: 300
  max_retries: 3
  concurrent_requests: 2

elasticsearch:
  hosts:
    - "http://localhost:9200"
  index_name: "benchlab-results"
  # username: "elastic"
  # password: "changeme"

target_models:
  - name: "llama3.2:3b"
    display_name: "Llama 3.2 3B"
  - name: "mistral:7b"
    display_name: "Mistral 7B"
    parameters:
      temperature: 0.7
      num_ctx: 4096

evaluation:
  enabled: true
  evaluator_models:
    - "llama3.2:3b"
  scoring_dimensions:
    - name: coherence
      weight: 1.0
      description: "Logical flow and consistency"
    - name: accuracy
      weight: 1.5
      description: "Factual correctness"
    - name: relevance
      weight: 1.0
      description: "Addresses the prompt directly"
    - name: completeness
      weight: 1.0
      description: "Covers all aspects of the prompt"
    - name: conciseness
      weight: 0.8
      description: "Avoids unnecessary verbosity"
    - name: helpfulness
      weight: 1.2
      description: "Practically useful to the user"
  require_reasoning: true

run:
  default_max_tokens: 2048
  default_temperature: 0.7
  warmup_runs: 0
  repetitions: 1
  pull_models_on_start: true
